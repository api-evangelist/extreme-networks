    XiqUpdateRpRadioUsageOptimizationRequest:
      type: object
      properties:
        preamble:
          type: string
          description: The preamble data length -- "AUTO" or "LONG"
        beacon_period:
          maximum: 3500
          minimum: 40
          type: integer
          description: The amount of time between beacons in the range from 40 to 3500.
          format: int32
        enable_frame_burst:
          type: boolean
          description: Whether to enable Frame Burst
        enable_smart_antenna:
          type: boolean
          description: Whether to enable Smart Antenna (Enabling this option will disable (Null) for MU-MIMO)
        enable_backhaul_failover:
          type: boolean
          description: Whether to enable backhaul failover. Backhaul failover settings determine the thresholds at which the device switches from a wired to a wireless backhaul link, and the thresholds at which the device switches back
        wireless_backhaul_switch_trigger_time:
          maximum: 5
          minimum: 1
          type: integer
          description: Switch to Wireless Backhaul after the number of seconds (1 to 5) after the wired link fails
          format: int32
        wired_backhaul_revert_hold_time:
          maximum: 300
          minimum: 1
          type: integer
          description: Revert Back to Wired Backhaul after the number of seconds (1 to 300) after the wired link is established
          format: int32
        enable_band_steering:
          type: boolean
          description: Whether to enable band steering. Enabling steers clients from 2.4 GHz to 5.0 GHz radio band
        band_steering_mode:
          type: string
          description: The band steering mode -- "BALANCE", "URGE_5G", or "ENFORCE_5G"
        ratio_for5g_clients:
          maximum: 100
          minimum: 1
          type: integer
          description: The allowed percentage distribution of 2.4 and 5.0 GHz clients for "BALANCE" steering mode.
          format: int32
        ignore_initial_client_connection_number:
          maximum: 100
          minimum: 1
          type: integer
          description: The number of connection attempts from 2.4 GHz clients to ignore before responding for URGE_5G steering mode.
          format: int32
        enable_client_load_balancing:
          type: boolean
          description: Whether to enable client load balancing.  Enabling load-balances clients across neighboring Extreme Networks within the same hive. Set WiFi0 and WiFi1 radios to the same load balancing mode when it is based on the number of associated stations.
        load_balancing_mode:
          type: string
          description: The client load balancing mode -- "AIRTIME_BASED" or "CLIENT_NUMBER"
        crc_error_rate_per_device:
          maximum: 99
          minimum: 1
          type: integer
          description: The CRC Error rate threshold value for "AIRTIME_BASED" load balancing. Ignore probe and association requests per device when CRC Error rate exceeds the threshold.
          format: int32
        rf_interference_per_device:
          maximum: 99
          minimum: 1
          type: integer
          description: The RF Interference threshold value for "AIRTIME_BASED" load balancing. Ignore probe and association requests per device when RF Interference exceeds the threshold.
          format: int32
        average_airtime_per_client:
          maximum: 5
          minimum: 1
          type: integer
          description: The Average Airtime Per Client threshold value for "AIRTIME_BASED" load balancing. Ignore probe and association requests per device when Average Airtime Per Client exceeds the threshold.
          format: int32
        anchor_period:
          maximum: 600
          minimum: 10
          type: integer
          description: The Anchor Period value for both "AIRTIME_BASED" and "CLIENT_NUMBER" load balancing. Ignore probe and association requests from clients associated with other Extreme Networks devices until Anchor Period Eelapses in the range of 10 to 600 seconds
          format: int32
        neighbor_query_interval:
          maximum: 600
          minimum: 1
          type: integer
          description: In both client load balancing modes, query neighbors about client load every in the range of 1 to 600 seconds
          format: int32
        enable_weak_signal_probe_request_suppression:
          type: boolean
          description: Whether to enable Weak Signal Probe Request Suppression. Weak Signal Probe Request Suppression allows the configuration of signal-to-noise threshold beyond which the device does not respond to client probes.
        weak_snr_threshold:
          maximum: 100
          minimum: 1
          type: integer
          description: The signal to noise threshold in the range of 1 to 100 for Weak Signal Probe Request Suppression.
          format: int32
        enable_safety_net:
          type: boolean
          description: Whether to enable Safety Net. When a device is overloaded or is probed by clients with a low signal-to-noise ratio,  Safety Net allows the device to respond to association requests  after a certain time period lapses.
        safety_net_period:
          maximum: 300
          minimum: 5
          type: integer
          description: The Safety Net Time Period in the range of 5 to 300 seconds.
          format: int32
        enable_high_density:
          type: boolean
          description: Whether to enable High Density Configuration. Enabling optimizes performance in high density environments
        management_frame_basic_data_rate:
          type: string
          description: The data rates to support in high density environment -- "HIGH" or "LOW"
        enable_suppress_successive_probe_request:
          type: boolean
          description: Whether to Reduce Response to Probe Requests. Enabling suppresses successive requests within the same beacon interval
        probe_response_reduction_option:
          type: string
          description: The suppress response to broadcast probes options --  "ONLY_ONE_SSID_RESPOND_AT_A_TIME" (allowed for only one SSID to respond at a time), "REDUCE_CERTAIN_CLIENTS_RESPONSE" (reducing responses to certain client devices).
        suppression_limit:
          maximum: 10
          minimum: 1
          type: integer
          description: The Number of Connection Attempts in the range of 1 to 10
          format: int32
        enable_radio_balance:
          type: boolean
          description: Whether to enable Radio Load Balancing. Enabling distributes wireless clients that support 5 GHz band evenly across the two radios in Dual-5G mode when an SSID is available on both radios
        mac_oui_ids:
          type: array
          description: The MacOui Profile IDs for the "REDUCE_CERTAIN_CLIENTS_RESPONSE" probe response reduction option
          items:
            type: integer
            description: The MacOui Profile IDs for the "REDUCE_CERTAIN_CLIENTS_RESPONSE" probe response reduction option
            format: int64
        enable_ampdu:
          type: boolean
          description: Enable Aggregate MAC Protocol Data Units to combine data frames into larger frames before transmission.
        enable_mu_mimo:
          type: boolean
          description: Whether to enable Multiple-Input Multiple-Output (802.11ac & 802.11ax) for multiple-user access by using different spatial streams.
        enable_ofdma_down_link:
          type: boolean
          description: Whether to enable OFDMA for AP downlink communication.
        enable_ofdma_up_link:
          type: boolean
          description: Whether to enable OFDMA for AP uplink communication.
        bss_coloring:
          maximum: 63
          minimum: 1
          type: integer
          description: The numerical identifier of the basic service sets (802.11ax ) to identify overlapping basic service sets (OBSSs).
          format: int32
        enable_target_weak_time:
          type: boolean
          description: Whether to enable Target Weak Time.
