    XiqHsIpv4Type:
      type: string
      description: "The IPv4 address availability enum:\n  * `NOT_AVAILABLE` - No IPv4 address is available.\n  * `PUBLIC` - A publicly routable IPv4 address is available.\n  * `PORT_RESTRICTED` - An IPv4 address is available but with port restrictions.\n  * `SINGLE_NAT` - A private IPv4 address behind a single NAT (Network Address Translation).\n  * `DOUBLE_NAT` - A private IPv4 address behind a double NAT.\n  * `PORT_RESTRICTED_SINGLE_NAT` - A private IPv4 address behind a single NAT with port restrictions.\n  * `PORT_RESTRICTED_DOUBLE_NAT` - A private IPv4 address behind a double NAT with port restrictions.\n  * `UNKNOWN` - The type of IPv4 address availability is unknown."
