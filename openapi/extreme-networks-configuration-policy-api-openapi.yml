      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        properties:
          org_id:
            type: integer
            description: The organization identifier, valid when enabling HIQ feature
            format: int64
        required:
        - org_id
    XiqHsQosDscpException:
      type: object
      description: A DSCP priority to map to an Extreme QoS class that is different than the class mapped to the DSCP range in which the DSCP priority already exists.
      required:
      - dscp_value
      - ah_class
      properties:
        ah_class:
          type: integer
          minimum: 0
          maximum: 7
          description: Extreme QoS class value.
        dscp_value:
          type: integer
          minimum: 0
          maximum: 63
          description: Start value for DSCP range.
    PagedXiqRpMacOuiProfile:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              $ref: '#/components/schemas/XiqRpMacOuiProfile'
    XiqRadioProfile:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The payload of Radio Profile
        properties:
          name:
            type: string
            description: The radio profile name
          predefined:
            type: boolean
            description: Whether the radio profile is predefined or user-customized.
          description:
            type: string
            description: The radio profile description.
          transmission_power:
            type: integer
            description: The transmission power floor from 1 up to 20 dBm or null for Auto.
            format: int32
          max_transmit_power:
            type: integer
            description: The maximum transmit power from 10 up to 20 dBm.
            format: int32
          transmission_power_floor:
            type: integer
            description: The transmission power floor from 2 up to 20 dBm.
            format: int32
          transmission_power_max_drop:
            type: integer
            description: The transmission power max drop from 0 up to 18 dB.
            format: int32
          max_clients:
            type: integer
            description: The maximum number of clients from 1 up to 255.
            format: int32
          enable_client_transmission_power:
            type: boolean
            description: Whether or not client transmission power control (802.11h) is enabled.
          client_transmission_power:
            type: integer
            description: The client transmission power from 1 up to 20 dBm if it is enabled.
            format: int32
          enable_ofdma:
            type: boolean
            description: Whether to enable Orthogonal Frequency Division Multiple Access (802.11ax) for multiple-user access by subdividing a channel.
          radio_mode:
            $ref: '#/components/schemas/XiqRadioMode'
          neighborhood_analysis_id:
            type: integer
            description: The neighborhood analysis Id.
            format: int64
          channel_selection_id:
            type: integer
            description: The channel selection Id.
            format: int64
          radio_usage_optimization_id:
            type: integer
            description: The radio usage optimization Id.
            format: int64
          miscellaneous_settings_id:
            type: integer
            description: The miscellaneous settings Id
            format: int64
          presence_server_settings_id:
            type: integer
            description: The presence server settings Id.
            format: int64
          sensor_scan_settings_id:
            type: integer
            description: The sensor scan settings Id.
            format: int64
    XiqSsidKeyType:
      type: string
      description: The key type, ASCII or HEX
      example: ASCII
      enum:
      - ASCII
      - HEX
    XiqExpirationSettings:
      type: object
      description: The password expiration settings
      properties:
        expiration_type:
          $ref: '#/components/schemas/XiqExpirationType'
        valid_during_dates:
          $ref: '#/components/schemas/XiqValidDuringDateSettings'
        valid_for_time_period:
          $ref: '#/components/schemas/XiqValidForTimePeriodSettings'
        valid_daily:
          $ref: '#/components/schemas/XiqValidDailySettings'
        expiration_action:
          $ref: '#/components/schemas/XiqExpirationActionType'
        post_expiration_action:
          $ref: '#/components/schemas/XiqPostExpirationAction'
    XiqUpdateClassificationRequest:
      type: object
      description: The details of rule Rules
      required:
      - classification_type
      - match
      - classification_type_id
      properties:
        classification_type:
          type: string
          description: Classification type
          enum:
          - CLASSIFICATION_TYPE_UNSPECIFIED
          - CLASSIFICATION_TYPE_LOCATION
          - CLASSIFICATION_TYPE_CLOUD_CONFIG_GROUP
          - CLASSIFICATION_TYPE_IP_ADDRESS
          - CLASSIFICATION_TYPE_IP_SUBNET
          - CLASSIFICATION_TYPE_IP_RANGE
          - UNRECOGNIZED
        match:
          type: boolean
          description: Contains or not contains)
        classification_type_id:
          type: integer
          description: The ID of location, cloud config group, IP address, IP subnet or IP range.
          format: int64
    XiqVlanObjectClassifiedEntry:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The payload of VLAN object classified entry
        required:
        - vlan_id
        properties:
          vlan_id:
            type: integer
            description: The VLAN ID
            format: int32
          classification_rule:
            $ref: '#/components/schemas/XiqClassificationRule'
    XiqRadiusClientProfileEntry:
      allOf:
      - type: object
        description: The RADIUS client profile entry.
        properties:
          classification_assignment_id:
            type: integer
            format: int64
            description: The classification assignment ID for RADIUS client profile entry.
          radius_client_object_id:
            type: integer
            format: int64
            description: The RADIUS client object ID for RADIUS client profile entry.
    XiqCreateL3AddressProfileRequest:
      type: object
      required:
      - name
      - address_type
      properties:
        name:
          type: string
          description: The L3 Address profile name.
        value:
          type: string
          description: The L3 Address profile value.
        description:
          type: string
          description: The L3 Address profile description.
        address_type:
          $ref: '#/components/schemas/XiqL3AddressType'
          description: The L3 address type.
        enable_classification:
          type: boolean
          description: The flag to enable classification entries on host name address profile.
        classified_entries:
          type: array
          description: The host name address profile classified entries.
          items:
            $ref: '#/components/schemas/XiqAddressProfileClassifiedEntry'
            description: The host name address profile classified entry.
        ip_address_end:
          type: string
          description: The classified entry IP address end, only available for "IP_RANGE" address type.
        netmask:
          type: string
          description: The classified entry IP address end, only available for "IP_SUBNET" address type.
        wildcard_mask:
          type: string
          description: The wildcard address profile mask value, only available for "WILDCARD" address type.
    XiqAddressProfileClassifiedEntry:
      type: object
      description: Address profile classified entry
      properties:
        value:
          type: string
          description: The classified entry value.
        description:
          type: string
          description: The classified entry description.
        netmask:
          type: string
          description: The classified entry netmask.
        ip_address_end:
          type: string
          description: The classified entry IP address end.
        wildcard_mask:
          type: string
          description: The classified entry wildcard mask.
        classification_assignment_id:
          type: integer
          format: int64
          description: The classification assignment ID for RADIUS client profile entry.
    XiqSsidAdvancedSettings:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The advanced settings for the SSID
        properties:
          enable802_dot11mc:
            type: boolean
            description: Whether to enable 802.11mc on SSID
    XiqPasswordDbLocation:
      type: string
      description: The access key storage location
      enum:
      - CLOUD
      - LOCAL
    XiqSetSsidModeDot1xRequest:
      type: object
      description: The request for setting the SSID to be 802.1x mode and Authentication settings. Authentication with ExtremeCloud IQ Authentication Service and Authentication with ExtremeCloud Universal ZTNA are mutually exclusive.
      required:
      - key_management
      - encryption_method
      properties:
        key_management:
          $ref: '#/components/schemas/XiqSsidDot1xKeyManagement'
        encryption_method:
          $ref: '#/components/schemas/XiqSsidDot1xEncryptionMethod'
        enable_idm:
          type: boolean
          description: Flag for using ExtremeCloud IQ Authentication Service or not
        enable_uztna:
          type: boolean
          default: false
          description: Flag for using Authentication with ExtremeCloud Universal ZTNA or not
        transition_mode:
          type: boolean
          description: Flag for enabling transition mode if using WPA3 as the key management type
        radius_server_group_id:
          type: integer
          description: The RADIUS server group ID if not using ExtremeCloud IQ Authentication Service
          format: int64
        user_group_ids:
          type: array
          description: The user group IDs if using ExtremeCloud IQ Authentication Service
          items:
            type: integer
            description: The user group IDs if using ExtremeCloud IQ Authentication Service
            format: int64
  parameters:
    page:
      name: page
      in: query
      description: Page number, min = 1
      required: false
      schema:
        minimum: 1
        type: integer
        format: int32
        default: 1
    limit:
      name: limit
      in: query
      description: Page Size, min = 1, max = 100
      required: false
      schema:
        maximum: 100
        minimum: 1
        type: integer
        format: int32
        default: 10
    async:
      in: query
      name: async
      description: Whether to enable async mode
      required: false
      schema:
        type: boolean
        default: false
    id:
      name: id
      in: path
      description: The unique identifier
      required: true
      schema:
        type: integer
        format: int64
    order:
      name: order
      in: query
      description: The sort order (ascending by default)
      required: false
      schema:
        $ref: '#/components/schemas/XiqSortOrder'
  responses:
    ErrorResponse:
      description: The generic ExtremeCloud IQ API error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/XiqError'
  securitySchemes:
    BearerAuth:
      type: http
      description: JSON Web Token (JWT) based authentication
      scheme: bearer
      bearerFormat: JWT
externalDocs:
  description: API Reference
  url: https://extremecloudiq.com/api-docs/api-reference.html
