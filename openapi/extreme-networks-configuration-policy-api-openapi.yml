  /radio-operating-modes/{productType}:
    get:
      tags:
      - Configuration - Policy
      summary: Get AP Radio Operating Mode
      description: "Modern AP hardware types include dual or triple band radios.\nA limited subset of band combinations are supported.\nOperating mode defines the supported band combinations per radio.    \nAccess Points with fixed band radios use GENERIC operating mode.  \nSERVICE_2_5_6:   wifi0-2.4Ghz, wifi1-5Ghz, wifi2-6Ghz\nSENSOR_SERVICE_5_6: wifi0-Tri-band sensor, wifi1-5Ghz, wifi2-6Ghz\nSERVICE_5L_5H_6: wifi0-5G Low, wifi1-5G High, wifi2-6Ghz\nSENSOR_SERVICE_5_2: wifi0-Tri-band sensor, wifi1-5GHz, wifi2-2.4Ghz\nSERVICE_5L_5H_2: wifi0-5G Low, wifi1-5G High, wifi2-2.4Ghz\nSERVICE_6L_5_6H: wifi0-6G Low, wifi1-5GHz, wifi2-6Ghz.\nSERVICE_2_5H_5L: wifi0-2.4Ghz, wifi1-5G High, wifi2-5G Low."
      externalDocs:
        description: API Reference
        url: https://extremecloudiq.com/api-docs/api-reference.html#_get_radio_operating_mode
      operationId: getDeviceOperationMode
      parameters:
      - name: productType
        in: path
        description: Product/AP Model
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XiqDeviceRadioModesSettings'
        default:
          $ref: '#/components/responses/ErrorResponse'
      security:
      - BearerAuth: []
components:
  schemas:
    PagedIpFirewall:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              $ref: '#/components/schemas/XiqIpFirewall'
    XiqIotProfile:
      allOf:
      - $ref: '#/components/schemas/XiqViqEntity'
      - $ref: '#/components/schemas/XiqIotProfileRequest'
    XiqL3AddressType:
      type: string
      description: Address type
      enum:
      - IP_ADDRESS
      - IP_SUBNET
      - IP_RANGE
      - HOST_NAME
      - WILDCARD_HOST_NAME
      - WILDCARD
    XiqUpdateRpNeighborhoodAnalysisRequest:
      type: object
      properties:
        enable_background_scan:
          type: boolean
          description: Whether background scan of neighboring devices is enabled
        background_scan_interval:
          maximum: 1440
          minimum: 1
          type: integer
          description: The background scan interval in the range of 1 to 1440 minutes
          format: int32
        enable_skip_scan_when_clients_connected:
          type: boolean
          description: Whether to skip background scan when devices have client connections
        enable_skip_scan_when_clients_in_power_save_mode:
          type: boolean
          description: Whether to skip background scan when connected devices are in power save mode
        enable_skip_scan_when_process_voice_traffic:
          type: boolean
          description: Whether to skip background scan when devices have network traffic with voice priority
    XiqExpirationActionType:
      type: string
      description: The Expiration Action to take, null if the account is never expired.
      enum:
      - SHOW_MESSAGE
      - REJECT_ACCESS
    XiqIotpMaBleScanApplication:
      type: object
      description: The BLE Scan application
      oneOf:
      - $ref: '#/components/schemas/XiqIotpMaBleScanIBeacon'
      - $ref: '#/components/schemas/XiqIotpMaBleScanEddystoneUrl'
      - $ref: '#/components/schemas/XiqIotpMaBleScanGeneric'
      discriminator:
        propertyName: app_type
        mapping:
          IBEACON: '#/components/schemas/XiqIotpMaBleScanIBeacon'
          EDDYSTONE_URL: '#/components/schemas/XiqIotpMaBleScanEddystoneUrl'
          GENERIC: '#/components/schemas/XiqIotpMaBleScanGeneric'
    XiqRecurrenceType:
      type: string
      enum:
      - EVERYDAY
      - WEEKDAY_RANGE
      description: The schedule recurrence type.
    XiqHsNaiRealm:
      type: object
      description: The Network Access Identification (NAI) realm.
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: NAI realm.
        description:
          type: string
          description: Description of NAI realm.
        eap_methods:
          type: array
          description: The list of Extensible Authentication Protocol (EAP) methods.
          items:
            $ref: '#/components/schemas/XiqHsEapMethod'
        encoding_type:
          $ref: '#/components/schemas/XiqHsNaiEncodingType'
    XiqHttpServer:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          maxLength: 256
          format: uri
          description: The HTTP server URL.
        interval:
          maximum: 60
          minimum: 1
          default: 10
          type: integer
          format: int32
          description: The HTTP server interval, in seconds.
        enable_deduplication:
          type: boolean
          default: true
          description: Enable to remove BLE scan duplicates entries within the specified time interval.
    XiqIpFirewallAction:
      type: string
      enum:
      - PERMIT
      - DENY
      - TRAFFIC_DROP
      - NAT
      - REDIRECT
    XiqRpMacOuiProfile:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The MAC OUI profile for radio profile
        properties:
          name:
            type: string
            description: The product model
          description:
            type: string
            description: The product description
          predefined:
            type: boolean
            description: Whether the MAC Oui is predefined.
          value:
            type: string
            description: The MAC octets
          mac_type:
            type: string
            description: The type or "MAC_OUI"
          defender_defined:
            type: boolean
            description: Whether defender is defined
          extreme_iot_defined:
            type: boolean
            description: Whether is the Extreme Iot Defined
    XiqSsidDot1xEncryptionMethod:
      type: string
      description: 'The encryption method: for WPA_8021X, WPA2_8021X, please use CCMP or TKIP, for AUTO_8021X, please use AUTO_TKIP_CCMP, for WPA3_8021X, please use AES192'
      enum:
      - CCMP
      - TKIP
      - AUTO_TKIP_CCMP
      - AES192
    XiqHsRoamingConsortium:
      type: object
      description: The Roaming Consortium network provider.
      required:
      - consortium_id
      properties:
        consortium_id:
          type: string
          pattern: ^[0-9A-Fa-f]{6,30}$
          description: IEEE-assigned Organizational Identifier (OI).
        description:
          type: string
          description: Description of Roaming Consortium OI.
    XiqIotpMaBleScan:
      type: object
      properties:
        destination:
          $ref: '#/components/schemas/XiqIotpMaBleScanDestination'
        applications:
          type: array
          maxItems: 3
          description: Collection of BLE Scan applications
          items:
            $ref: '#/components/schemas/XiqIotpMaBleScanApplication'
    XiqRpSensorScanSettings:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The sensor scan settings for the radio profile
        properties:
          enable_scan_all_channels:
            type: boolean
            description: Whether to enable scanning all channels
          dwell_time:
            type: string
            description: The dwell time in ms
          scan_channels:
            type: string
            description: The comma separated list of scan channels
    XiqSsid1:
      allOf:
      - $ref: '#/components/schemas/XiqViqEntity'
      - type: object
        description: The SSID
        required:
        - name
        - broadcast_name
        - predefined
        properties:
          name:
            type: string
            description: The SSID profile name
          broadcast_name:
            type: string
            description: The SSID broadcast name
          description:
            type: string
            description: The SSID description
          predefined:
            type: boolean
            description: Whether it is predefined
          enable_user_profile_assignment:
            type: boolean
            description: The flag to enable User Profile Assignment.
          enable_radius_attribute_user_profile_assignment:
            type: boolean
            description: The flag to enable Radius Attribute User Profile Assignment.
          attribute_type:
            $ref: '#/components/schemas/XiqAttributeType'
            description: The SSID attribute type.
          attribute_key:
            type: integer
            description: The SSID attribute key.
            format: int32
          access_security:
            $ref: '#/components/schemas/XiqSsidAccessSecurity'
            description: The SSID access security.
          radius_client_profile:
            $ref: '#/components/schemas/XiqRadiusClientProfile'
            description: The RADIUS client profile.
          default_user_profile:
            type: integer
            description: The default User Profile ID.
            format: int64
          vendor_id:
            type: integer
            description: The vendor id, when the Attribute type is CUSTOM.
          user_profile_assignment_rules:
            type: array
            description: The user profile assignment rules.
            items:
              $ref: '#/components/schemas/XiqUserProfileAssignmentRule'
          advanced_settings_id:
            type: integer
            description: The SSID advanced settings ID
            format: int64
    XiqHsIpv6Type:
      type: string
      description: The IPv6 address availability enum.
      default: UNKNOWN
      enum:
      - NOT_AVAILABLE
      - AVAILABLE
      - UNKNOWN
    XiqClientMonitorSetting:
      type: object
      description: The client monitor setting
      properties:
        association:
          description: Setting for reporting the client association problem
          $ref: '#/components/schemas/XiqClientMonitorParameters'
        authentication:
          description: Setting for reporting the client authentication problem
          $ref: '#/components/schemas/XiqClientMonitorParameters'
        networking:
          description: Setting for reporting the client networking problem
          $ref: '#/components/schemas/XiqClientMonitorParameters'
    XiqCreateUserProfileAssignmentRequest:
      type: object
      properties:
        name:
          type: string
          description: The User Profile Assignment
        description:
          type: string
          description: The User Profile Assignment description
        folder_ids:
          type: array
          description: The location folder Id list.
          items:
            type: integer
            format: int64
            description: The location ID.
        assignment_radius_attribute:
          $ref: '#/components/schemas/XiqUserProfileAssignmentRadiusAttribute'
          description: The User Profile Assignment Radius Attribute.
    XiqHsWanLinkStatus:
      type: string
      description: The WAN metric status.
      enum:
      - DOWN
      - UP
      - TEST
    XiqClassification:
      allOf:
      - $ref: '#/components/schemas/XiqBaseEntity'
      - type: object
        description: The payload of common object - classification
        required:
        - classification_type
        - match
        - classification_id
        - value
        properties:
          classification_type:
            $ref: '#/components/schemas/XiqClassificationType'
          match:
            type: boolean
            description: Contains or not contains
          classification_id:
            type: integer
            description: The ID of location, cloud config group, IP address, IP subnet or IP range.
            format: int64
          value:
            type: string
            description: The value of classification
    XiqIotpMaBleBeaconApplication:
      type: object
      description: The BLE Beacon application
      oneOf:
      - $ref: '#/components/schemas/XiqIotpMaBleBeaconIBeacon'
      - $ref: '#/components/schemas/XiqIotpMaBleBeaconEddystoneUrl'
      discriminator:
        propertyName: app_type
        mapping:
          IBEACON: '#/components/schemas/XiqIotpMaBleBeaconIBeacon'
          EDDYSTONE_URL: '#/components/schemas/XiqIotpMaBleBeaconEddystoneUrl'
    XiqL3AddressCommon:
      allOf:
      - type: object
        description: The L3 address common objects
        required:
        - name
        - address_type
        properties:
          predefined:
            type: boolean
            description: Flag to describe whether the application is predefined or customised.
          name:
            type: string
            description: Address profile name.
          description:
            type: string
            description: Address profile description.
          value:
            type: string
            description: Address profile value.
          enable_classification:
            type: boolean
            description: The flag to enable classification on L3 address profile.
          address_type:
            $ref: '#/components/schemas/XiqL3AddressType'
            description: The L3 address profile type.
          classified_entries:
            type: array
            description: The address profile classified entries.
            items:
              $ref: '#/components/schemas/XiqAddressProfileClassifiedEntry'
              description: address profile classified entry.
    XiqSetSsidModePpskRequest:
      type: object
      description: The request for setting the SSID to be PPSK mode.
      required:
      - key_management
      - encryption_method
      - user_group_ids
      - enable_max_clients_per_ppsk
      - enable_mac_bind
      properties:
        key_management:
          $ref: '#/components/schemas/XiqSsidPpskKeyManagement'
        encryption_method:
          $ref: '#/components/schemas/XiqSsidPskEncryptionMethod'
        user_group_ids:
          type: array
          description: The user group IDs to be attached to the SSID, cannot be empty
          items:
            type: integer
            description: The user group IDs to be attached to the SSID, cannot be empty
            format: int64
        enable_max_clients_per_ppsk:
          type: boolean
          description: Flag for enabling the max clients per PPSK
        max_clients_per_ppsk:
          maximum: 15
          minimum: 0
          type: integer
          description: The max clients (0-15) per PPSK if enabled enable_max_clients_per_ppsk flag, 0 means unlimited
          format: int32
        enable_mac_bind:
          type: boolean
          description: Flag for enabling mac binding or not. This setting is only supported with local PPSK.
        max_macs_per_ppsk:
          maximum: 5
          minimum: 1
          type: integer
          description: Set the max MAC binding numbers per private PSK, Min:1, Max:5
          format: int32
        ppsk_server_id:
          type: integer
          description: The PPSK server device ID
          format: int64
    XiqIotpMaBleScanIBeacon:
      type: object
      required:
      - app_type
      properties:
        app_type:
          $ref: '#/components/schemas/XiqIotpMaBleScanAppType'
        min_rss:
          maximum: 20
          minimum: -120
          default: -100
          type: integer
          format: int32
          description: BLE Scan iBeacon application minimum Received Signal Strength value, in dBm.
        uuid:
          type: string
          default: 00000000-0000-0000-0000-000000000000
          format: uuid
          description: BLE Scan iBeacon application UUID. A value of "00000000-0000-0000-0000-000000000000" indicates no filtering is applied.
    XiqExpirationType:
      type: string
      description: The for one of the account expiration types.
      enum:
      - NEVER_EXPIRE
      - VALID_DURING_DATES
      - VALID_FOR_TIME_PERIOD
      - DAILY
    XiqHsConnectionCapabilityStatus:
      type: string
