      description: 'Modern AP hardware types include dual or triple band radios. A limited subset of band combinations are supported. Operating mode defines the supported band combinations per radio. Access Points with fixed band radios use GENERIC operating mode. <br/> SERVICE_2_5_6: wifi0-2.4Ghz, wifi1-5Ghz, wifi2-6Ghz <br/> SENSOR_SERVICE_5_6: wifi0-Tri-band sensor, wifi1-5Ghz, wifi2-6Ghz <br/> SERVICE_5L_5H_6: wifi0-5G Low, wifi1-5G High, wifi2-6Ghz <br/> SENSOR_SERVICE_5_2: wifi0-Tri-band sensor, wifi1-5GHz, wifi2-2.4Ghz <br/> SERVICE_5L_5H_2: wifi0-5G Low, wifi1-5G High, wifi2-2.4Ghz <br/> SERVICE_6L_5_6H: wifi0-6G Low, wifi1-5GHz, wifi2-6Ghz <br/> SERVICE_2_5H_5L: wifi0-2.4Ghz, wifi1-5G High, wifi2-5G Low <br/>'
      enum:
      - GENERIC
      - SERVICE_2_5_6
      - SENSOR_SERVICE_5_6
      - SERVICE_5L_5H_6
      - SENSOR_SERVICE_5_2
      - SERVICE_5L_5H_2
      - SERVICE_6L_5_6H
      - SERVICE_2_5H_5L
      type: string
      default: GENERIC
      example: SERVICE_2_5_6
