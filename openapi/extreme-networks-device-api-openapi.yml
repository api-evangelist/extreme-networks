      properties:
        long_eui:
          oneOf:
          - type: string
            minLength: 16
            maxLength: 16
            pattern: ^[0-9a-fA-F]+$
            description: The factory-assigned IEEE EUI-64. (16 hex digits). FFFFFFFFFFFFFFFF is reserved.
          - type: string
            pattern: ^\*$
            description: Match any joiner.
