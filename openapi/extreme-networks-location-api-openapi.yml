                items:
                  $ref: '#/components/schemas/ClsWallTypeReference'
        default:
          $ref: '#/components/responses/ErrorResponse'
      security:
      - BearerAuth: []
components:
  parameters:
    page:
      name: page
      in: query
      description: Page number, min = 1
      required: false
      schema:
        minimum: 1
        type: integer
        format: int32
        default: 1
    limit:
      name: limit
      in: query
      description: Page Size, min = 1, max = 100
      required: false
      schema:
        maximum: 100
        minimum: 1
        type: integer
        format: int32
        default: 10
    id:
      name: id
      in: path
      description: The unique identifier
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ClsCreateBuildingRequest:
      type: object
      required:
      - parent_id
      - name
      - address
      properties:
        parent_id:
          type: integer
          description: The parent location ID
          format: int64
        name:
          type: string
          description: The building name
        address:
          $ref: '#/components/schemas/ClsAddress'
        latitude:
          type: number
          description: The latitude coordinate for the building
          format: double
        longitude:
          type: number
          description: The longitude coordinate for the building
          format: double
    PagedClsLocationTreeMap:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              $ref: '#/components/schemas/ClsLocationTreeMap'
    ClsMeasurementUnit:
      type: string
      description: The measurement unit in feet/meters
      enum:
      - FEET
      - METERS
    ClsCreateLocationRequest:
      type: object
      required:
      - parent_id
      - name
      properties:
        parent_id:
          type: integer
          description: The parent location ID
          format: int64
        name:
          type: string
          description: The location name
    ClsAddress:
      type: object
      required:
      - address
      - city
      - state
      properties:
        address:
          type: string
          description: The street address 1
        address2:
          type: string
          description: The street address 2
        city:
          type: string
          description: the city/town of the address
        postal_code:
          type: string
          description: The postal/ZIP code of the address
        state:
          type: string
          description: The province/state of the address
    ClsUpdateWallTypeRequest:
      type: object
      required:
      - attenuation
      - color
      - name
      properties:
        name:
          maxLength: 254
          type: string
          description: The Wall type name
        attenuation:
          maximum: 999
          minimum: -999
          type: number
          description: The Wall type attenuation
          format: double
        color:
          pattern: ^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{8})$
          type: string
          description: The Wall type color
    ClsBuilding:
      allOf:
      - $ref: '#/components/schemas/XiqViqEntity'
      - type: object
        description: The building information
        required:
        - name
        - parent_id
        properties:
          parent_id:
            type: integer
            description: The parent location ID
            format: int64
