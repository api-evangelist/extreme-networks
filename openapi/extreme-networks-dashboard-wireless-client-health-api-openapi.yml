  /dashboard/wireless/client-health/export:
    post:
      tags:
      - Dashboard - Wireless Client Health
      summary: Export Grid as a CSV File
      description: Returns the CSV File of the client health grid of wireless devices based on the provided filters. You can filter the results by sites.
      externalDocs:
        description: API Reference
        url: https://extremecloudiq.com/api-docs/api-reference.html#_post_client_health_grid_export
      operationId: wirelessClientHealthGridExport
      parameters:
      - name: keyword
        in: query
        description: The keyword to search
        required: false
        schema:
          type: string
      - name: sortField
        in: query
        description: The sort field
        required: false
        schema:
          $ref: '#/components/schemas/XiqClientHealthSortField'
      - name: sortOrder
        in: query
        description: The sort order
        required: false
        schema:
          $ref: '#/components/schemas/XiqSortOrder'
      - name: connectionStatus
        in: query
        description: The current connection status of the client (e.g., connected, disconnected).
        required: false
        schema:
          $ref: '#/components/schemas/XiqClientHealthConnectionStatus'
      - name: includeUnassigned
        in: query
        description: To include unassigned clients
        required: false
        schema:
          type: boolean
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                site_ids:
                  description: List of site IDs to filter the client health grid
                  type: array
                  items:
                    type: integer
                    format: int64
                device_ids:
                  description: List of device IDs to filter the device health grid
                  type: array
                  items:
                    type: integer
                    format: int64
                number_filter:
                  type: array
                  description: The number based column filters available(Available columns- dhcp_response_time,snr,rssi, authentication_failures, association_failures,  roaming, onboarding_time).
                  items:
                    $ref: '#/components/schemas/number_filter'
                frequency:
                  description: The frequency band (e.g., 2.4 GHz, 5 GHz) used by the client device.
                  $ref: '#/components/schemas/XiqClientHealthFrequencySortField'
                alias:
                  description: The aliases available
                  type: array
                  items:
                    type: string
                auth_methods:
                  description: The authentication methods available
                  type: array
                  items:
                    type: string
                encryption_methods:
                  description: The encryption methods available
                  type: array
                  items:
                    type: string
                operating_systems:
                  description: The operating systems available
                  type: array
                  items:
                    type: string
                ssids:
                  description: The ssids available
                  type: array
                  items:
                    type: string
                user_profiles:
                  description: The user profiles available
                  type: array
                  items:
                    type: string
                category_assignments:
                  description: The category assignments available
                  type: array
                  items:
                    type: string
                has_association_issues:
                  description: Indicates if the client has an association issue
                  type: boolean
                has_authentication_issues:
                  description: Indicates if the client has an authentication issue
                  type: boolean
                has_ip_address_issues:
                  description: Indicates if the client has an IP address issue
                  type: boolean
                has_roaming_issues:
                  description: Indicates if the client has a roaming issue
                  type: boolean
      responses:
        '202':
          description: Accepted - The request has been accepted for processing, but the processing has not been completed.
          headers:
            cache-control:
              description: Cache control directives
              schema:
                type: string
            content-length:
              description: The length of the response body in octets (8-bit bytes)
              schema:
                type: integer
            date:
              description: The date and time at which the message was originated
              schema:
                type: string
                format: date-time
            expires:
              description: The date/time after which the response is considered stale
              schema:
                type: string
            location:
              description: The URL to which the client should navigate to check the status of the request
              schema:
                type: string
                format: uri
            pragma:
              description: Implementation-specific directives that might apply to any recipient along the request-response chain
              schema:
                type: string
            ratelimit-limit:
              description: The maximum number of requests that the client is allowed to make in a given time period
              schema:
                type: string
            ratelimit-remaining:
              description: The number of requests remaining in the current rate limit window
              schema:
                type: integer
            retry-after:
              description: The amount of time to wait before making a follow-up request
              schema:
                type: integer
            server:
              description: A name for the server
              schema:
                type: string
                example: nginx
            x-content-type-options:
              description: Prevents the browser from interpreting files as a different MIME type
              schema:
                type: string
            x-xss-protection:
              description: Enables cross-site scripting (XSS) filter
              schema:
                type: string
                format: byte
        default:
          $ref: '#/components/responses/ErrorResponse'
      security:
      - BearerAuth: []
  /dashboard/wireless/client-health/reports/{id}:
    get:
      tags:
      - Dashboard - Wireless Client Health
      summary: Download the Export CSV file
      description: Returns the CSV File of the Wireless Client Health status based on the provided filters.
      externalDocs:
        description: API Reference
        url: https://extremecloudiq.com/api-docs/api-reference.html#_get_client_grid_export_report
      operationId: wirelessClientHealthGridExportReport
      parameters:
      - name: id
        in: path
        description: The report ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Returns the CSV File of the Wireless Client Health
          content:
            application/octet-stream:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ErrorResponse'
      security:
      - BearerAuth: []
components:
  parameters:
    page:
      name: page
      in: query
      description: Page number, min = 1
      required: false
      schema:
        minimum: 1
        type: integer
        format: int32
        default: 1
    limit:
      name: limit
      in: query
      description: Page Size, min = 1, max = 100
      required: false
      schema:
        maximum: 100
        minimum: 1
        type: integer
        format: int32
        default: 10
  schemas:
    RmWirelessClientHealthIpAddressIssueResponse:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        description: The response body of wireless client health issues.
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              type: object
              properties:
                date_time:
                  description: The timestamp of the issue.
                  type: string
                  format: date-time
                issue_type:
                  description: The issue type.
                  type: string
                device_name:
                  type: string
                  description: The device name.
    XiqSortOrder:
      type: string
      enum:
      - ASC
      - DESC
    RmWirelessClientHealthIssueResponse:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        description: The response body of wireless client health issues.
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              type: object
              properties:
                date_time:
                  description: The timestamp of the issue.
                  type: string
                  format: date-time
                reason_code:
                  description: The reason code for the issue.
                  type: string
                device_name:
                  type: string
                  description: The device name.
    XiqWirelessClientHealthFrequencyDistribution:
      type: object
      properties:
        total_clients:
          type: integer
          format: int64
          description: The total number of clients
        clients_2dot4GHz:
          type: integer
          format: int64
          description: The number of clients using the 2.4 GHz frequency band
        clients_5GHz:
          type: integer
          format: int64
          description: The number of clients using the 5 GHz frequency band
        clients_6GHz:
          type: integer
          format: int64
          description: The number of clients using the 6 GHz frequency band
    XiqWirelessConnectionStatus:
      type: string
      enum:
      - CONNECTED
      - DISCONNECTED
    XiqClientHealthConnectionStatus:
      type: string
      title: ClientHealthSortField
      description: Pre-defined filters for warnings in dashboard - CONNECTED - DISCONNECTED
      example: CONNECTED
    XiqClientHealthSortField:
      type: string
      title: ClientHealthSortField
      description: Pre-defined filters for warnings in dashboard - OPERATING_SYSTEM - CLIENT_RETRIES - IPV6 - RSSI - SNR - CLIENT_MAC - USER_PROFILE - ENCRYPTION - DEVICE_MAC - IPV4 - CONNECTION_STATUS - ALIAS - CATEGORY_ASSIGNMENT - CLIENT_IP - AIR_TIME - FREQUENCY - RX_CLIENT_RETIRES - AUTHENTICATION - CLIENT_DEVICE_ID - VLAN - TX_CLIENT_RETIRES
      example: OPERATING_SYSTEM
    XiqWirelessClientHealthConnectivityIssues:
      type: object
      properties:
        total_clients:
          type: integer
          format: int64
          description: The total number of clients
        association_failures:
          type: integer
          format: int64
          description: The number of failed or slow associations (where slow is defined as >= 5 seconds)
        authentication_failures:
          type: integer
          format: int64
          description: The number of failed or slow authentications (where slow is defined as >= 5 seconds)
        ip_address_issues:
          type: integer
          format: int64
          description: The number of DHCP issues, including private IP address assignments or slow responses (where slow is defined as >= 5 seconds)
    XiqErrorParams:
      type: object
      description: Error parameters
      properties:
        field:
          type: string
          description: The error field
        value:
          type: string
          description: The error value
    number_filter:
      type: object
      description: If the filter type is between, only then min and max are to be used, else value is to be used.
      properties:
        column_name:
          description: The name of the column being filtered
          type: string
        filter_type:
          description: The type of number filter
          type: string
          enum:
          - eq
          - neq
          - gt
          - gte
          - lt
          - lte
          - bw
          - blank
          - notblank
        value:
          description: The value of the number
          type: integer
          format: int64
        min:
          description: The minimum value of the number
          type: integer
          format: int64
        max:
          description: The maximum value of the number
          type: integer
          format: int64
    PagedXiqClientHealthGridResponse:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              $ref: '#/components/schemas/XiqClientHealthGridResponse'
    XiqError:
      type: object
      properties:
        error_code:
          type: string
          description: The error code
        error_id:
          type: string
          description: The error ID for internal troubleshooting
        error_message:
          type: string
          description: The error detailed message
        error_message_code:
          type: string
          description: The error message code
        error_message_description:
          type: string
          description: The error message description
        error_params:
          $ref: '#/components/schemas/XiqErrorParams'
      required:
      - error_code
      - error_id
      - error_message
    RmWirelessClientHealthRoamingIssueResponse:
      allOf:
      - $ref: '#/components/schemas/XiqPage'
      - type: object
        description: The response body of wireless client health issues.
        properties:
          data:
            type: array
            description: The data in the current page
            items:
              type: object
              properties:
                date_time:
                  description: The timestamp of the issue.
                  type: string
                  format: date-time
                issue_type:
                  description: The issue type.
                  type: string
                roaming_time:
                  description: The roaming time.
                  type: string
                device_name:
                  type: string
                  description: The device name.
    XiqPage:
      required:
      - count
      - page
      - total_count
      - total_pages
      type: object
      properties:
        page:
          type: integer
          description: The current page number
          format: int32
        count:
          type: integer
          description: The element count of the current page
          format: int32
        total_pages:
          type: integer
          description: The total page number based on request page size
          format: int32
        total_count:
          type: integer
          description: The total element count
          format: int64
    XiqClientHealthFrequencySortField:
      type: string
      title: ClientHealthFrequencyField
      description: Pre-defined filters for client health frequency - 2.4GHz - 5Ghz - 6Ghz
      example: 2.4GHz
    XiqClientHealthGridResponse:
