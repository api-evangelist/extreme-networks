          type: string
      - name: includeUnassigned
        in: query
        description: To include unassigned clients
        required: false
        schema:
          type: boolean
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                site_ids:
                  description: List of site IDs to filter the client health grid
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Returns the response of client health grid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmWirelessClientHealthIssueResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
      security:
      - BearerAuth: []
