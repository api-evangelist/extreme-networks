apis:
  - aid: extreme-networks:extremecloud-iq-api
    name: ExtremeCloud IQ API
    description: >-
      The ExtremeCloud IQ REST API enables customers and partners to manage,
      monitor, and provision any ExtremeCloud IQ environment. It is an
      OpenAPI 3.0 surface with 460+ operations covering authentication and API
      tokens, accounts and users, hierarchical organizations (HIQ), locations
      and floor plans, devices across Cloud Engine / IQ Engine / WiNG / VOSS /
      EXOS, network policy for wired and wireless, network scorecards, clients,
      application metrics, alerts, logs, notifications, deployment and
      configuration management, Copilot anomalies and connectivity experience,
      packet captures, ExtremeLocation, SD-WAN, AFC, Universal Compute Platform,
      and dashboards. Hosted at https://api.extremecloudiq.com and licensed
      under Apache 2.0.
    humanURL: https://developer.extremecloudiq.com/
    baseURL: https://api.extremecloudiq.com
    tags:
      - Networking
      - Cloud Management
      - Wireless
      - Wired
      - SD-WAN
      - Device Management
      - Network Policy
