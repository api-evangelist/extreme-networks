  - aid: extreme-networks:extremecloud-iq-controller-rest-api
    name: ExtremeCloud IQ Controller REST API Gateway
    description: >-
      On-premises REST API gateway exposed by the ExtremeCloud IQ Controller
      (the wired and wireless campus controller). Provides programmatic access
      to controller configuration, sites, RF management, AP and switch
      provisioning, RADIUS, NAC, and reporting on locally managed Extreme
      infrastructure. Version 10.03.01 of the gateway is documented at
      documentation.extremenetworks.com.
    humanURL: https://documentation.extremenetworks.com/ExtremeCloud_IQ_Controller/v10.03.01/API/index_gateway_api.html
    tags:
      - Networking
      - Wireless
      - Controller
      - On-Premises
    properties:
      - type: Documentation
        url: https://documentation.extremenetworks.com/ExtremeCloud_IQ_Controller/v10.03.01/API/index_gateway_api.html

  - aid: extreme-networks:extremecloud-iq-controller-application-manager-api
    name: ExtremeCloud IQ Controller Application Manager API
    description: >-
      Application Manager REST API for the ExtremeCloud IQ Controller,
      enabling visibility into Layer 7 application traffic, per-application
      policy, and per-application reporting on locally managed Extreme
      wireless and wired networks.
