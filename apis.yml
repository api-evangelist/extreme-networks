aid: extreme-networks
name: Extreme Networks
description: >-
  Extreme Networks (NASDAQ: EXTR) is a Morrisville, North Carolina–headquartered
  enterprise networking company that provides cloud-managed wired switching,
  Wi-Fi 6E/Wi-Fi 7 wireless access, SD-WAN, and integrated network security
  for education, healthcare, government, retail, manufacturing, and large
  venues. Its flagship platform is Extreme Platform ONE, an AI-driven
  networking platform that unifies wired, wireless, and security operations,
  built on top of ExtremeCloud IQ — the company's multi-tenant, cloud-managed
  network management system. ExtremeCloud IQ exposes a comprehensive
  OpenAPI 3.0 REST API at api.extremecloudiq.com covering authentication,
  device lifecycle, network policy, client and application analytics, alerts,
  dashboards, SD-WAN, Copilot connectivity experience, packet captures, and
  hierarchical multi-organization management, with official SDKs in Python,
  Java, Go, JavaScript, and C#. Extreme also publishes Ansible collections for
  EXOS, VOSS, SLXOS, NOS, and Fabric Engine for declarative on-box switch
  configuration, a public Postman collection of 400+ requests, and a portfolio
  of on-prem REST gateways for ExtremeCloud IQ Controller (campus wireless
  controller) and Application Manager.
